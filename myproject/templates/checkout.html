{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4">Checkout</h2>
<form method="post" action="{% url 'place_order' %}">
  {% csrf_token %}
  <div class="row">
    <div class="col-md-6">
      <h5>Shipping Address</h5>
      <input type="text" name="address" class="form-control mb-2" placeholder="Address" required>
      <input type="text" name="city" class="form-control mb-2" placeholder="City" required>
      <input type="text" name="state" class="form-control mb-2" placeholder="State" required>
      <input type="text" name="postal_code" class="form-control mb-2" placeholder="Postal Code" required>
      <input type="text" name="country" class="form-control mb-2" placeholder="Country" required>
      <input type="text" name="phone" class="form-control mb-2" placeholder="Phone" required>
      <input type="email" name="email" class="form-control mb-2" placeholder="Email" required value="{{ user.email }}">
    </div>
    <div class="col-md-6">
      <h5>Order Summary</h5>
      <ul class="list-group mb-2">
        {% for item in items %}
          <li class="list-group-item d-flex justify-content-between align-items-center">
            {{ item.product.name }} x{{ item.quantity }}
            <span>&#8377; {{ item.total_price|floatformat:2 }}</span>
          </li>
        {% endfor %}
      </ul>
      <p>Total: <span class="fw-bold">&#8377; {{ total }}</span></p>
      <input type="text" name="coupon" class="form-control mb-2" placeholder="Coupon Code">
      <h5>Payment Method</h5>
      <select name="payment_method" class="form-select mb-2" required>
        <option value="razorpay">Razorpay</option>
        <option value="stripe">Stripe</option>
        <option value="cod">Cash on Delivery</option>
      </select>
      <button type="submit" class="btn btn-success w-100">Place Order</button>
    </div>
  </div>
</form>
{% endblock %}
