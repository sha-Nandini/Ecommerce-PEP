
{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4">Order History</h2>
<table class="table">
  <thead>
    <tr>
      <th>Order #</th>
      <th>Date</th>
      <th>Status</th>
      <th>Total</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for order in orders %}
    <tr>
      <td>{{ order.id }}</td>
      <td>{{ order.created_at|date:'M d, Y' }}</td>
      <td>{{ order.status }}</td>
      <td>&#8377; {{ order.total_price }}</td>
      <td><a href="{% url 'order_detail' order.id %}" class="btn btn-outline-primary btn-sm">View</a></td>
    </tr>
    {% empty %}
    <tr><td colspan="5">No orders found.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
